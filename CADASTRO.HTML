<!DOCTYPE html>
<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cadastro de nova obra — Acervo Gross</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-white text-black;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-6 lg:px-20 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[1400px] flex-1">
<header class="flex flex-wrap items-center justify-between gap-2 border-b border-black px-4 py-3 mb-8">
<div class="flex items-center gap-3 text-black">
<div class="flex items-center justify-center">
<span class="material-symbols-outlined text-2xl md:text-3xl">account_balance</span>
</div>
<h2 class="text-base md:text-lg font-bold leading-tight tracking-widest uppercase">Acervo Gross - Centenário</h2>
</div>
<div class="flex flex-1 flex-wrap justify-end gap-2 items-center">
<nav class="hidden md:flex items-center gap-10">
<a class="text-black text-xs font-bold tracking-widest uppercase hover:opacity-70" href="paginainicial.html">Página Inicial</a>
</nav>
<a href="paginainicial.html" class="flex w-full md:w-auto md:min-w-[160px] items-center justify-center border border-black h-10 px-5 bg-black text-white text-xs font-bold tracking-widest uppercase transition-all hover:bg-white hover:text-black">
<span class="truncate">Voltar à Galeria</span>
</a>
</div>
</header>
<main class="flex-1 px-4 py-8">
<div class="max-w-3xl mx-auto">
<h1 class="text-3xl md:text-4xl font-bold uppercase tracking-tight mb-3">Cadastrar nova obra</h1>
<p class="text-sm md:text-base text-slate-600 mb-8">Preencha os campos abaixo para incluir uma nova obra no acervo. Os campos podem ser editados posteriormente.</p>
<form class="space-y-6" onsubmit="event.preventDefault(); alert('Cadastro simulado. Ajuste o código para salvar os dados.');">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Título</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: Cartaz comemorativo dos 50 anos do Laboratório Gross" required />
</label>
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Autor / Empresa</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: Laboratório Gross S.A." required />
</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Técnica</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: Impressão gráfica em cartaz promocional" />
</label>
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Ano</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: c. década de 1960" />
</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Dimensões</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: 50 x 70 cm" />
</label>
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Nº de catálogo</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: LG-INST-50AN-004" />
</label>
</div>
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Estado / Observações</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: Documento histórico preservado em acervo" />
</label>
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Notas curatoriais</span>
<textarea class="form-textarea w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" rows="5" placeholder="Observações sobre a obra, contexto histórico, etc."></textarea>
</label>
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Tags</span>
<input class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Ex: Anúncio, Década de 1930, Publicidade" />
</label>
<label class="flex flex-col gap-2">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Arquivo de imagem</span>
<input type="file" accept="image/*" class="form-input w-full border border-black/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black" />
<span class="text-[10px] text-slate-500">Selecione um arquivo de imagem (.png, .jpg, etc.).</span>
</label>
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
<button type="submit" class="w-full sm:w-auto px-6 py-3 bg-black text-white font-bold uppercase tracking-widest hover:bg-white hover:text-black border border-black transition-all">Salvar</button>
<button type="reset" class="w-full sm:w-auto px-6 py-3 border border-black text-black font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all">Limpar</button>
</div>
</form>
</div>
</main>
<footer class="mt-12 py-12 border-t border-black text-center">
<p class="text-black text-[10px] font-bold uppercase tracking-[0.4em]">ACERVO DO LABORATÓRIO GROSS 2026</p>
</footer>
</div>
</div>
</div>
</body>
</html>
